name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run backend tests
        working-directory: backend
        run: npm test --silent
      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=high || true

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend unit tests
        working-directory: frontend
        run: npx vitest run
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=list
      - name: Lint frontend
        working-directory: frontend
        run: npx eslint . || true
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
