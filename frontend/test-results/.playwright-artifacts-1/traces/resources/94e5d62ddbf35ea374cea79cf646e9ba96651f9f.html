<!doctype html>
<html lang="en">
  <head>
    <script type="module">import { injectIntoGlobalHook } from "/@react-refresh";
injectIntoGlobalHook(window);
window.$RefreshReg$ = () => {};
window.$RefreshSig$ = () => (type) => type;</script>

    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Social Preview / OG Tags -->
    <meta property="og:title" content="NSS Portal - Volunteer Management System" />
    <meta property="og:description" content="National Service Scheme Volunteer Management & Gamification Platform" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo.png" />

    <title>NSS Portal</title>
  </head>
  <body>
    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1d4ed8; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.5s ease;">
      <img src="/logo.png" alt="NSS Portal" style="width:100px; height:100px; object-fit:contain; margin-bottom:20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));" />
      <h1 style="color:white; font-family:sans-serif; font-weight:900; font-size:28px; letter-spacing: 1px;">NSS PORTAL</h1>
      <div style="margin-top:20px; width:40px; height:40px; border:4px solid rgba(255,255,255,0.3); border-radius:50%; border-top-color:white; animation: spin 1s linear infinite;"></div>
    </div>

    <style>
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Reset for mobile tap highlight */
      * { -webkit-tap-highlight-color: transparent; }
    </style>

    <div id="root"></div>
    <script>
      // Senior Check: Detect if browser is in "Offline Mode"
      window.addEventListener('load', () => {
        const updateStatus = () => {
          if (!navigator.onLine) {
             console.error('🚨 BROWSER OFFLINE MODE DETECTED. Check DevTools Network Tab.');
             const warning = document.createElement('div');
             warning.style = 'position:fixed; bottom:20px; right:20px; background:red; color:white; padding:15px; border-radius:10px; z-index:10000; font-weight:bold; box-shadow:0 10px 30px rgba(0,0,0,0.3);';
             warning.innerHTML = '⚠️ BROWSER IS OFFLINE. Check DevTools!';
             document.body.appendChild(warning);
          }
        };
        updateStatus();
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Ensures the splash screen disappears after React is ready
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          // Wait slightly longer to ensure React has painted
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }, 800);
        }
      });
    </script>
  </body>
</html>
